<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | Amurskзапчасти</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="page-wrapper">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">🚗 Автозапчасти контракт и б/у</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link" href="/support">Поддержка</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="content container py-4">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <h2 class="mb-4">Вход</h2>
                % if error == 'invalid':
                <div class="alert alert-danger">Неверный телефон или пароль</div>
                % endif
                <form method="post" action="/login">
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="text" name="phone" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Войти</button>
                </form>
                <p class="mt-3">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>
    <footer class="bg-black text-light py-4 mt-auto border-top border-danger">
        <div class="container text-center">
            <p class="fw-bold mb-1">Amurskзапчасти</p>
            <p class="mb-1">Лучшие автозапчасти</p>
            <p class="mb-1">📞 +7 (914) 416-05-70</p>
            <p class="small mt-2">&copy; 2026 Amurskзапчасти</p>
        </div>
    </footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
