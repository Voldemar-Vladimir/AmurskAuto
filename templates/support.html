<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поддержка | Amurskзапчасти</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="page-wrapper">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">🚗 Автозапчасти контракт и б/у</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link" href="/support">Поддержка</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin">Админ-панель</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="content container py-4">
        <h1 class="mb-4">Поддержка</h1>
        % if success:
        <div class="alert alert-success">Ваше сообщение отправлено! Мы свяжемся с вами.</div>
        % endif
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="post" action="/support">
                    <div class="mb-3">
                        <label class="form-label">Ваше имя</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Телефон или email</label>
                        <input type="text" name="contact" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Вопрос или предложение</label>
                        <textarea name="message" class="form-control" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Отправить</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="bg-black text-light py-4 mt-auto border-top border-danger">
        <div class="container text-center">
            <p class="fw-bold mb-1">Amurskзапчасти</p>
            <p class="mb-1">Лучшие автозапчасти</p>
            <p class="mb-1">📞 +7 (914) 416-05-70</p>
            <p class="small mt-2">&copy; 2026 Amurskзапчасти</p>
        </div>
    </footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
